<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">


<title>
Jago Excel by YEC.CO.ID
</title>



<style>


:root{

--bg:#101010;
--card:#1d1d1d;
--text:#ffffff;
--muted:#aaa;
--primary:#16a34a;

}



.light{

--bg:#f4f4f4;
--card:#ffffff;
--text:#111;
--muted:#555;

}



*{

box-sizing:border-box;
font-family:
'Segoe UI',
Arial,
sans-serif;

}



body{

margin:0;

background:var(--bg);

color:var(--text);

transition:.3s;

}





header{


display:flex;

justify-content:space-between;

align-items:center;

padding:18px 25px;

background:var(--card);

position:sticky;

top:0;

z-index:99;


}



.logo{

font-size:22px;

font-weight:bold;

}



.theme{

font-size:16px;
cursor:pointer;
display: flex;
align-items: center;
gap: 8px;
background: var(--bg);
padding: 8px 16px;
border-radius: 20px;
border: 1px solid var(--muted);
transition: 0.3s;
user-select: none;

}

.theme:hover{
opacity: 0.8;
}



.container{

max-width:1200px;

margin:auto;

padding:20px;

}




.login{

max-width:420px;

margin:80px auto;

background:var(--card);

padding:30px;

border-radius:20px;

box-shadow:
0 10px 30px #0005;

}



input{


width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:none;

background:#333;

color:white;

font-size:15px;

}


.light input{

background:#eee;

color:#111;

}





button{


width:100%;

padding:14px;

border:none;

border-radius:12px;

margin-top:10px;

cursor:pointer;

background:var(--primary);

color:white;

font-size:16px;

transition:.2s;


}


button:hover{

transform:scale(1.03);

}





.card{


background:var(--card);

padding:20px;

border-radius:18px;

margin:15px 0;

}



.grid{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:20px;


}



.batch{


cursor:pointer;

transition:.2s;


}



.batch:hover{

transform:translateY(-5px);

}




.video-wrapper{

height:calc(100vh - 180px);

}
  
.video-area{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

height:100%;

}



.player{

background:black;

height:100%;

border-radius:20px;

overflow:hidden;

position:sticky;

top:20px;

}

.player-text{

position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
font-size: 24px;
color: var(--muted);
width: 100%;
text-align: center;
font-weight: bold;
pointer-events: none;

}


iframe{

position: absolute;

top: 0;

left: 0;

width:100%;

height:100%;

border:0;

}




.item{

padding:14px;

background:var(--card);

border-radius:12px;

margin:10px 0;

cursor:pointer;

}



#content{

height:100%;

overflow-y:auto;

padding-right:10px;

}



.item:hover{

opacity:.8;

}




.back{

background:#555;

}



.logout{

background:#dc2626;

}



.hidden{

display:none;

}




.loading{


text-align:center;

padding:30px;


}




.small{

color:var(--muted);

}


/* ===========================
   PENGATURAN TOMBOL KEMBALI
   =========================== */
.back-btn{

display:block;

/* Margin untuk Desktop: Rata Kiri */
margin:20px 0 40px 0;

width:250px;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

background:var(--primary);

color:white;

font-size:16px;

font-weight:bold;

}

/* ===========================
   PENGATURAN KELOLA PESERTA
   =========================== */
.search-box {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--muted);
  background: var(--bg);
  color: var(--text);
  margin-bottom: 20px;
  font-size: 15px;
}

.table-wrapper {
  overflow-x: auto;
  margin-top: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

th, td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #333;
}

.light th, .light td {
  border-bottom: 1px solid #ddd;
}

th {
  color: var(--muted);
  font-weight: normal;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  background: #3b82f6;
  color: white;
  display: inline-block;
  margin: 2px;
}

.badge.status-aktif {
  background: #16a34a;
}

.badge.status-nonaktif {
  background: #dc2626;
}

.btn-small {
  width: auto;
  padding: 6px 12px;
  font-size: 12px;
  margin-top: 0;
  margin-right: 5px;
  display: inline-block;
}

.btn-danger {
  background: #dc2626;
}

.btn-warning {
  background: #d97706;
}

.header-peserta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}


@media(max-width:800px){

#themeText{
display:none;
}

.theme{
padding:8px 10px;
}

.video-wrapper{
height:auto;
display:block;
}

/* Mematikan flexbox sepenuhnya untuk menghindari bug area sentuh (hitbox) meleset di HP */
.video-area{
display:block;
}

.player{
position:relative !important;
width:100%;
height:378px !important;
display:block;
border-radius:12px !important;
overflow:visible !important;
margin-bottom:20px;
z-index: 1;
}

.player iframe{
position:absolute;
top:0;
left:0;
width:100% !important;
height:100% !important;
border:none;
}

#content{
height:auto;
max-height:450px;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

/* Pengaturan khusus tombol kembali di HP agar tetap di tengah */
.back-btn{
margin:20px auto 40px auto;
}

}



#password {
  transition: opacity 0.15s ease;
}
  
</style>


</head>


<body>


<header>


<div class="logo">

📗 Jago Excel by YEC.CO.ID

</div>


<div 
class="theme"
onclick="toggleTheme()">

<span id="themeIcon">🌙</span>
<span id="themeText">Dark Mode</span>

</div>


</header>



<div id="app"></div>



<script>


const API_URL =
"https://script.google.com/macros/s/AKfycbwXq6BJqFM4ThQLmMiHJzp4NPs9JPS_hnCicX0CjSycuMuRBp6OATnp--aS7vGhxnuS/exec";


// ==========================================
// START APP
// ==========================================


let userData = null;

// Hapus Data Dummy, kita pakai data asli dari server
let semuaPeserta = [];


window.onload=function(){

loadTheme();


let session =
localStorage.getItem("user");


if(session){

  // Sistem Pembersih (Anti-Blank Screen)
  try {
    userData = JSON.parse(session);

    if(userData && userData.role == "admin"){
      showAdmin();
    }
    else if(userData && userData.role == "peserta"){
      showPeserta();
    }
    else {
      logout();
    }
  } catch(e) {
    // Jika data memori rusak/nyangkut, bersihkan dan suruh login ulang
    logout();
  }

}
else{


showLogin();


}


};





// ==========================================
// THEME
// ==========================================

function toggleTheme(){


document.body.classList.toggle("light");


let mode =
document.body.classList.contains("light")
?
"light"
:
"dark";


localStorage.setItem(
"theme",
mode
);

updateThemeUI();

}



function loadTheme(){


let theme =
localStorage.getItem("theme");


if(theme=="light"){

document.body.classList.add("light");

}

updateThemeUI();

}


function updateThemeUI() {
  let isLight = document.body.classList.contains("light");
  let icon = document.getElementById("themeIcon");
  let text = document.getElementById("themeText");
  
  if(icon && text) {
    icon.innerHTML = isLight ? "☀️" : "🌙";
    text.innerHTML = isLight ? "Light Mode" : "Dark Mode";
  }
}







// ==========================================
// LOGIN PAGE
// ==========================================


function showLogin(){


document.getElementById("app").innerHTML=`

<div class="container">


<div class="login">


<h2>
📗 Jago Excel by YEC.CO.ID
</h2>


<p class="small">
Masukkan data login
</p>



<input 
id="username"
placeholder="Nama Lengkap / Username Admin"
>



<div style="position:relative;">

  <input 
    id="password"
    type="password"
    placeholder="Kode Batch / Password"
  >

  <span
    id="eyeIcon"
    onclick="togglePassword()" 
    style="
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      color:#aaa;
      font-size:14px;
      user-select:none;
    ">
    👁
  </span>

</div>



<button onclick="login()">

🚀 MASUK

</button>



<div id="message"></div>


</div>


</div>

`;



}







// ==========================================
// PROSES LOGIN
// ==========================================


function login(){


let username =
document.getElementById("username")
.value;


let password =
document.getElementById("password")
.value;



if(
username=="" ||
password==""
){


showMessage(
"Data belum lengkap"
);


return;

}



showMessage(
"⏳ Memeriksa data..."
);





// coba peserta dulu


fetch(

API_URL+

"?action=loginPeserta"+

"&nama="+

encodeURIComponent(username)+

"&kode="+

encodeURIComponent(password)

)


.then(r=>r.json())


.then(data=>{


if(data.status=="success"){


userData=data;


saveSession();


showPeserta();


}

else{


// coba admin


loginAdmin(
username,
password
);


}



})

.catch(err=>{


showMessage(
"Server error"
);


});



}







// ==========================================
// LOGIN ADMIN
// ==========================================


function loginAdmin(username,password){


fetch(

API_URL+

"?action=loginAdmin"+

"&username="+
encodeURIComponent(username)+

"&password="+
encodeURIComponent(password)

)


.then(r=>r.json())


.then(data=>{


if(data.status=="success"){


userData=data;


saveSession();


showAdmin();


}


else{


showMessage(
"Nama/Kode tidak ditemukan"
);


}



});


}





function showMessage(text){

let msg =
document.getElementById("message");


if(msg){

msg.innerHTML=
`
<p class="small">
${text}
</p>
`;

}

}

// ==========================================
// SESSION
// ==========================================


function saveSession(){


localStorage.setItem(

"user",

JSON.stringify(userData)

);


}



function checkSession(){


let data =
localStorage.getItem("user");


if(data){


userData =
JSON.parse(data);



if(userData.role=="admin"){

showAdmin();

}
else{

showPeserta();

}


}

}







function logout(){


localStorage.removeItem("user");


userData=null;


showLogin();


}








// ==========================================
// PESERTA DASHBOARD
// ==========================================


function showPeserta(){


let html=`


<div class="container">


<h2>
Halo 👋 ${userData.nama}
</h2>


<p class="small">
Selamat belajar di Jago Excel by YEC.CO.ID
</p>



<h3>
📚 Kelas Kamu
</h3>



<div class="grid">


`;





userData.batch.forEach(batch=>{


html+=`

<div class="card batch"
onclick="openClass('${batch.folder}','${batch.name}','${batch.code}')">


<h3>

📗 ${batch.name}

</h3>


<p>

Kode:
${batch.code}

</p>


<button>

▶ Masuk Kelas

</button>


</div>


`;



});





html+=`

</div>


<button class="logout"
onclick="logout()">

🚪 Logout

</button>


</div>


`;



document.getElementById("app")
.innerHTML=html;


}









// ==========================================
// ADMIN DASHBOARD
// ==========================================


function showAdmin(){


let html=`


<div class="container">


<h2>
👑 Admin Panel
</h2>


<p>
📗 Jago Excel by YEC.CO.ID
</p>



<div class="card">


<h3>
Menu Admin

<button onclick="showAllBatch()">

📚 Lihat Semua Kelas

function showAllBatch(){


let box =
document.getElementById(
"adminContent"

<h3>

// ==========================================
// KELOLA PESERTA (LIVE API)
// ==========================================

function showKelolaPeserta(){

  let box = document.getElementById("adminContent");

  let html = `
    <div class="header-peserta">
      <h3>👥 Kelola Peserta</h3>
      <button class="btn-small" style="background:var(--primary);">+ Tambah Peserta</button>
    </div>

    <input type="text" id="searchPeserta" class="search-box" placeholder="🔍 Cari nama peserta atau kelas..." onkeyup="filterPeserta()">

    <div class="card">
      <div class="table-wrapper">
        <table id="tabelPeserta">
          <thead>
            <tr>
              <th>Nama / ID</th>
              <th>Akses Kelas</th>
              <th>Login Terakhir</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="bodyPeserta">
            <tr><td colspan="5" style="text-align:center; padding: 30px;">⏳ Memuat data dari Google Sheet...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  box.innerHTML = html;
  
  // Ambil data asli dari Google Script
  fetchDataPeserta();
}

function fetchDataPeserta() {
  fetch(API_URL + "?action=getAllPeserta")
    .then(r => r.json())
    .then(res => {
      if(res.status === "success") {
        semuaPeserta = res.data;
        renderTabelPeserta(semuaPeserta);
      } else {
        document.getElementById("bodyPeserta").innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">❌ Gagal memuat data: ${res.message}</td></tr>`;
      }
    })
    .catch(err => {
      document.getElementById("bodyPeserta").innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">❌ Error jaringan. Pastikan Apps Script sudah di-deploy dengan opsi 'Anyone'.</td></tr>`;
    });
}


function renderTabelPeserta(data) {
  let tbody = document.getElementById("bodyPeserta");
  let html = "";

  if(data.length === 0){
    html = `<tr><td colspan="5" style="text-align:center; padding: 20px;">Peserta tidak ditemukan</td></tr>`;
  }

  data.forEach(p => {
    
    let batchBadges = p.batch.length > 0 
      ? p.batch.map(b => `<div style="margin-bottom:4px;"><span class="badge">${b.nama}</span> <span class="badge" style="background:#4b5563;">🔑 ${b.kode}</span></div>`).join("") 
      : `<span class="small">- Belum ada akses -</span>`;

    let statusBadge = p.status === "AKTIF" 
      ? `<span class="badge status-aktif" id="badge-${p.id}">AKTIF</span>` 
      : `<span class="badge status-nonaktif" id="badge-${p.id}">NONAKTIF</span>`;

    let actionBtn = p.status === "AKTIF"
      ? `<button class="btn-small btn-danger" id="btn-${p.id}" onclick="toggleStatus('${p.id}')">❌ Disable</button>`
      : `<button class="btn-small" id="btn-${p.id}" onclick="toggleStatus('${p.id}')">✅ Enable</button>`;

    html += `
      <tr>
        <td>
          <strong>${p.nama}</strong><br>
          <span class="small">${p.id}</span><br>
          <span class="small" style="color:var(--primary);">📧 ${p.email}</span><br>
          <span class="small" style="color:var(--muted);">📱 ${p.hp}</span>
        </td>
        <td>${batchBadges}</td>
        <td><span class="small">${p.loginTerakhir}</span></td>
        <td>${statusBadge}</td>
        <td>
          ${actionBtn}
          <button class="btn-small btn-warning">📦 Edit Kelas</button>
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}


function filterPeserta() {
  let keyword = document.getElementById("searchPeserta").value.toLowerCase();
  
  let filtered = semuaPeserta.filter(p => {
    let matchName = p.nama.toLowerCase().includes(keyword);
    let matchBatch = p.batch.some(b => b.toLowerCase().includes(keyword));
    return matchName || matchBatch;
  });

  renderTabelPeserta(filtered);
}

// ==========================================
// MENGUBAH STATUS PESERTA (LIVE API)
// ==========================================
function toggleStatus(id) {
  let btn = document.getElementById("btn-" + id);
  let oldText = btn.innerHTML;
  btn.innerHTML = "⏳ Wait...";
  btn.disabled = true;

  fetch(API_URL + "?action=toggleStatusPeserta&id=" + encodeURIComponent(id))
    .then(r => r.json())
    .then(res => {
      if(res.status === "success") {
         // Update data lokal
         let index = semuaPeserta.findIndex(p => p.id === id);
         if(index !== -1){
            semuaPeserta[index].status = res.newStatus;
         }
         // Render ulang filter
         filterPeserta();
      } else {
         alert("Gagal mengubah status: " + res.message);
         btn.innerHTML = oldText;
         btn.disabled = false;
      }
    })
    .catch(err => {
      alert("Terjadi kesalahan jaringan");
      btn.innerHTML = oldText;
      btn.disabled = false;
    });
}

// ==========================================
// OPEN CLASS
// ==========================================


function openClass(folder,name,code){


document.getElementById("app").innerHTML=`

<div class="container">

<h2>

📚 ${name}

</h2>

<div class="video-wrapper">


<div class="video-area">


<div class="player" id="player">

<div class="player-text">Pilih video</div>

</div>



<div id="content">

<div class="loading">

⏳ Memuat video...

</div>

</div>


</div>



<button class="back-btn" onclick="backDashboard()">

⬅ Kembali

</button>


</div>


`;


loadFolder(folder,code);


}




// ==========================================
// LOAD FOLDER
// ==========================================


function loadFolder(folder,code){



fetch(

API_URL+

"?action=content"+
"&folder="+folder+
"&kode="+code

)



.then(r=>r.json())


.then(data=>{


if(data.status=="error"){

document.getElementById("content")
.innerHTML=

"❌ "+data.message;

return;

}


showContent(data);


})


.catch(()=>{


document.getElementById("content")
.innerHTML=

"❌ Gagal mengambil video";


});


}









// ==========================================
// TAMPILKAN FOLDER & VIDEO
// ==========================================


function showContent(data){


let box =
document.getElementById("content");


box.innerHTML="";


renderItems(
data,
box,
0
);


}




function renderItems(items,container,level){



items.forEach(item=>{



// =====================
// VIDEO
// =====================


if(item.type=="video"){


let div =
document.createElement("div");


div.className="item";


div.innerHTML=

"🎬 "+item.name;



div.onclick=function(){

playVideo(item.id);

};



container.appendChild(div);


}





// =====================
// FOLDER
// =====================


if(item.type=="folder"){



let folderBox =
document.createElement("div");


folderBox.className="card";



folderBox.style.marginLeft =
(level*15)+"px";



let title =
document.createElement("h3");


title.innerHTML=

"📁 "+item.name;



folderBox.appendChild(title);





let childBox =
document.createElement("div");



folderBox.appendChild(childBox);



container.appendChild(folderBox);



renderItems(

item.children,

childBox,

level+1

);



}



});



}








// ==========================================
// VIDEO PLAYER DRIVE
// ==========================================


function playVideo(id){



let player =
document.getElementById("player");



player.innerHTML=`

<iframe

src="https://drive.google.com/file/d/${id}/preview"

allow="autoplay; fullscreen"

allowfullscreen="true"

webkitallowfullscreen="true"

mozallowfullscreen="true">

</iframe>

`;



}







// ==========================================
// KEMBALI
// ==========================================


function backDashboard(){


if(userData.role=="admin"){

showAdmin();

}

else{

showPeserta();

}


}







// ==========================================
// AUTO LOGIN
// ==========================================


function togglePassword(){

  let input = document.getElementById("password");
  let icon = document.getElementById("eyeIcon");

  if(!input || !icon) return;

  input.style.opacity = "0.3";

  setTimeout(() => {

    if(input.type === "password"){
      input.type = "text";
      icon.innerHTML = "🙈";
    } else {
      input.type = "password";
      icon.innerHTML = "👁";
    }

    input.style.opacity = "1";

  }, 150);

}
  
</script>



</body>

</html>
